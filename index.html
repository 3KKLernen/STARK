<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>STARK – Motivationsschreiben Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --s:#00c9a7;--s2:#009d83;--sl:rgba(0,201,167,0.12);
  --t:#4f9eff;--t2:#2a7fe0;--tl:rgba(79,158,255,0.12);
  --a:#f5b942;--a2:#d49a28;--al:rgba(245,185,66,0.12);
  --r:#ff7c45;--r2:#d95e2a;--rl:rgba(255,124,69,0.12);
  --k:#ff4f6a;--k2:#d42f4a;--kl:rgba(255,79,106,0.12);
  --pu:#a78bfa;--pul:rgba(167,139,250,0.12);
  --bg:#07111f;--bg2:#0b1929;--bg3:#0f2035;
  --card:rgba(255,255,255,0.035);--cb:rgba(255,255,255,0.07);
  --text:#e8edf5;--muted:rgba(232,237,245,0.5);--faint:rgba(232,237,245,0.2);
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(0,201,167,0.07),transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 85%,rgba(79,158,255,0.06),transparent 60%);
  pointer-events:none;z-index:0;}

/* ── MODE SWITCHER ── */
.mode-bar{position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:rgba(7,17,31,0.92);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--cb);}
.mode-logo{font-family:'Fraunces',serif;font-size:18px;font-weight:900;
  background:linear-gradient(90deg,var(--s),var(--t),var(--a),var(--r),var(--k));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.mode-tabs{display:flex;gap:6px;}
.mode-tab{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;
  border:1.5px solid var(--cb);background:transparent;color:var(--muted);
  cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.mode-tab.active{border-color:var(--s);color:var(--s);background:var(--sl);}
.mode-tab:hover:not(.active){border-color:rgba(255,255,255,0.2);color:var(--text);}

/* ── LAYOUT ── */
.app{padding-top:60px;min-height:100vh;position:relative;z-index:1;}
.container{max-width:760px;margin:0 auto;padding:28px 20px 120px;}

/* ── HERO ── */
.hero{text-align:center;padding:40px 20px 0;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:100px;
  background:rgba(0,201,167,0.08);border:1px solid rgba(0,201,167,0.2);
  font-size:10px;font-weight:700;color:var(--s);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:20px;}
.stark-word{font-family:'Fraunces',serif;font-size:clamp(48px,9vw,72px);
  font-weight:900;letter-spacing:-1px;margin-bottom:12px;line-height:1;}
.stark-word span{display:inline-block;animation:drop 0.6s cubic-bezier(0.34,1.56,0.64,1) backwards;}
.stark-word .l0{color:var(--s);text-shadow:0 0 40px rgba(0,201,167,0.5);animation-delay:0.05s;}
.stark-word .l1{color:var(--t);text-shadow:0 0 40px rgba(79,158,255,0.5);animation-delay:0.12s;}
.stark-word .l2{color:var(--a);text-shadow:0 0 40px rgba(245,185,66,0.5);animation-delay:0.19s;}
.stark-word .l3{color:var(--r);text-shadow:0 0 40px rgba(255,124,69,0.5);animation-delay:0.26s;}
.stark-word .l4{color:var(--k);text-shadow:0 0 40px rgba(255,79,106,0.5);animation-delay:0.33s;}
@keyframes drop{from{opacity:0;transform:translateY(-24px) scale(0.8);}to{opacity:1;transform:none;}}
.hero-sub{font-family:'Fraunces',serif;font-style:italic;font-size:18px;
  color:var(--muted);margin-bottom:8px;}
.hero-desc{font-size:13px;color:var(--faint);max-width:400px;margin:0 auto;line-height:1.7;}

/* ── CARD ── */
.card{background:linear-gradient(145deg,rgba(255,255,255,0.045),rgba(255,255,255,0.02));
  border-radius:var(--radius);padding:32px;
  border:1px solid var(--cb);
  box-shadow:0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
  animation:cardIn 0.4s cubic-bezier(0.22,1,0.36,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:20px;}
.progress-steps{display:flex;gap:5px;margin-bottom:8px;}
.pstep{flex:1;height:5px;border-radius:3px;background:var(--cb);transition:all 0.4s;}
.pstep.done{background:var(--s);}
.pstep.now{box-shadow:0 0 12px var(--step-color,var(--s));transition:all 0.4s;}
.progress-labels{display:flex;gap:5px;}
.plabel{flex:1;font-size:8px;font-weight:700;letter-spacing:0.5px;
  text-transform:uppercase;text-align:center;
  color:var(--muted);transition:color 0.3s;}
.plabel.now{color:var(--step-color,var(--s));}

/* ── STEP HEADER ── */
.step-hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.step-badge{width:52px;height:52px;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0;}
.step-badge .sb-letter{font-family:'Fraunces',serif;font-size:26px;font-weight:900;line-height:1;}
.step-badge .sb-num{font-size:8px;font-weight:700;opacity:0.5;letter-spacing:1px;}
.step-info h2{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:3px;}
.step-info p{font-size:12px;color:var(--muted);}

/* ── INFO BOX ── */
.ibox{border-radius:14px;padding:16px 18px;margin-bottom:16px;border:1px solid;}
.ibox-head{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ibox-head::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;display:block;}
.ibox-body{font-size:13px;line-height:1.7;color:rgba(232,237,245,0.65);}
.ibox-body strong{color:var(--text);font-weight:600;}

/* ── COMPARE ── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.cmp{border-radius:12px;padding:12px 14px;border:1px solid;font-size:12px;line-height:1.6;}
.cmp-label{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.cmp-label::before{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;display:block;}
.cmp-bad{background:rgba(255,79,106,0.04);border-color:rgba(255,79,106,0.15);color:rgba(232,237,245,0.5);}
.cmp-bad .cmp-label{color:var(--k);}
.cmp-good{background:rgba(0,201,167,0.04);border-color:rgba(0,201,167,0.15);color:rgba(232,237,245,0.8);}
.cmp-good .cmp-label{color:var(--s);}

/* ── INTERVIEW (neue geführte Fragen) ── */
.interview{margin-bottom:20px;}
.interview-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.interview-title::after{content:'';flex:1;height:1px;background:var(--cb);}
.iq{margin-bottom:14px;}
.iq-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.5;}
.iq-options{display:flex;flex-wrap:wrap;gap:7px;}
.iq-opt{padding:8px 14px;border-radius:100px;font-size:12.5px;font-weight:500;
  border:1.5px solid var(--cb);background:transparent;color:var(--muted);
  cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.iq-opt:hover{border-color:rgba(255,255,255,0.25);color:var(--text);}
.iq-opt.selected{color:#fff;}
.iq-mini{font-size:11px;padding:6px 12px;}
.iq-input{width:100%;padding:11px 14px;border-radius:12px;
  border:1.5px solid var(--cb);background:rgba(255,255,255,0.025);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:all 0.25s;}
.iq-input:focus{border-color:var(--step-c,var(--s));box-shadow:0 0 0 3px rgba(0,201,167,0.08);}

/* ── SATZGERÜST ── */
.gerust{background:rgba(255,255,255,0.02);border-radius:14px;
  padding:16px 18px;border:1px solid var(--cb);margin-bottom:16px;}
.gerust-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pu);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.gerust-title::before{content:'⟡';font-size:12px;}
.gerust-text{font-size:13.5px;line-height:1.9;color:var(--text);}
.gerust-text .blank{display:inline-block;border-bottom:2px solid;padding:0 4px;
  min-width:60px;font-style:italic;opacity:0.8;}

/* ── TEXTAREA ── */
.field-label{font-size:12px;font-weight:600;color:rgba(232,237,245,0.75);
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
textarea{width:100%;padding:14px 16px;border-radius:14px;
  border:1.5px solid var(--cb);background:rgba(255,255,255,0.025);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14.5px;
  transition:all 0.25s;outline:none;resize:vertical;line-height:1.65;min-height:110px;}
textarea:focus{border-color:var(--step-c,var(--s));box-shadow:0 0 0 4px rgba(0,201,167,0.07);}
textarea::placeholder{color:var(--faint);}

/* ── QUALITÄTS-METER ── */
.qmeter{margin-top:12px;}
.qm-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.qm-track{flex:1;height:5px;border-radius:3px;background:var(--cb);overflow:hidden;}
.qm-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1),background 0.4s;}
.qm-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right;}
.qm-chips{display:flex;flex-wrap:wrap;gap:5px;}
.qm-chip{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;
  border:1px solid;transition:all 0.3s;}
.qm-chip.hit{opacity:1;}
.qm-chip.miss{opacity:0.25;}

/* ── KI-COACH ── */
.coach{margin-top:14px;border-radius:14px;padding:14px 16px;
  background:var(--pul);border:1px solid rgba(167,139,250,0.2);
  display:flex;gap:10px;align-items:flex-start;}
.coach-av{width:32px;height:32px;border-radius:10px;background:rgba(167,139,250,0.15);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.coach-body{flex:1;}
.coach-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pu);margin-bottom:4px;}
.coach-q{font-size:13px;line-height:1.65;color:rgba(232,237,245,0.7);}
.coach-q strong{color:var(--pu);}
.coach-hint{display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  padding:6px 12px;border-radius:8px;background:rgba(167,139,250,0.08);
  border:1px solid rgba(167,139,250,0.2);font-size:11.5px;color:var(--pu);
  cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.coach-hint:hover{background:rgba(167,139,250,0.15);}

/* ── FREEZE HINT ── */
.freeze-hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  padding:12px 20px;border-radius:14px;
  background:rgba(11,25,41,0.95);border:1px solid var(--cb);
  backdrop-filter:blur(16px);font-size:13px;color:var(--text);
  display:flex;align-items:center;gap:10px;
  animation:slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
  z-index:50;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.freeze-close{opacity:0.5;cursor:pointer;font-size:16px;margin-left:4px;}
.freeze-close:hover{opacity:1;}

/* ── SPARKS ── */
.sparks-wrap{margin-bottom:14px;}
.sparks-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.sparks-label::after{content:'';flex:1;height:1px;background:var(--cb);}
.sparks{display:flex;flex-wrap:wrap;gap:6px;}
.spark{padding:7px 12px;border-radius:100px;font-size:11.5px;
  border:1.5px solid var(--cb);color:var(--muted);background:transparent;
  cursor:pointer;transition:all 0.2s;line-height:1.3;}
.spark:hover,.spark.used{border-color:var(--step-c,var(--s));
  color:var(--step-c,var(--s));background:rgba(0,201,167,0.06);transform:translateY(-1px);}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;margin-top:24px;justify-content:space-between;align-items:center;}
.btn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;
  border:none;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn-back{background:rgba(255,255,255,0.04);color:var(--muted);border:1.5px solid var(--cb);}
.btn-back:hover{background:rgba(255,255,255,0.08);color:var(--text);}
.btn-next{color:#fff;}
.btn-next:hover:not(:disabled){transform:translateY(-2px);}
.btn-next:disabled{opacity:0.2;cursor:not-allowed;}

/* ── BRIEF (Ergebnis) ── */
.letter-wrap{background:#f8f9ff;border-radius:18px;padding:44px 40px;
  margin-top:16px;color:#1a2035;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.letter-meta{font-size:11.5px;color:#555;line-height:1.9;margin-bottom:24px;
  padding-bottom:18px;border-bottom:1px solid #e4e6ef;}
.letter-subject{font-family:'Fraunces',serif;font-size:17px;font-weight:700;
  color:#0d1525;margin-bottom:24px;}
.letter-body p{font-size:13px;line-height:1.9;color:#2a3450;margin-bottom:14px;}
.letter-close{margin-top:24px;font-size:13px;color:#2a3450;}
.letter-sig{margin-top:16px;padding-top:14px;border-top:1px solid #e4e6ef;}
.letter-sig .sig{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#0d1525;margin-top:6px;}
.seg-tag{display:inline-flex;align-items:center;font-size:7.5px;font-weight:700;
  letter-spacing:0.5px;padding:2px 6px;border-radius:4px;margin-left:4px;
  vertical-align:middle;text-transform:uppercase;}
.tag-s{background:#d1fae5;color:#065f46;}
.tag-t{background:#dbeafe;color:#1d4ed8;}
.tag-a{background:#fef9c3;color:#854d0e;}
.tag-r{background:#ffedd5;color:#9a3412;}
.tag-k{background:#fee2e2;color:#991b1b;}
.colorbar{display:flex;gap:3px;margin:16px 0 6px;border-radius:3px;overflow:hidden;}
.cb-seg{flex:1;height:3px;}

/* ── RESULT ACTIONS ── */
.result-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:24px;}
.act{padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.act:hover{transform:translateY(-2px);}
.act-print{background:var(--s);color:#fff;box-shadow:0 4px 20px rgba(0,201,167,0.3);}
.act-copy{background:var(--a);color:#fff;box-shadow:0 4px 20px rgba(245,185,66,0.3);}
.act-back2{background:rgba(255,255,255,0.05);color:var(--muted);border:1.5px solid var(--cb);}

/* ── DASHBOARD ── */
.dash{padding:16px 0;}
.dash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dash-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;}
.dash-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.dash-actions{display:flex;gap:8px;}
.dash-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;
  border:1.5px solid var(--cb);background:transparent;color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.dash-btn:hover{border-color:var(--s);color:var(--s);background:var(--sl);}
.dash-btn.active{border-color:var(--s);color:var(--s);background:var(--sl);}
.pupil-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.pupil-card{background:var(--card);border-radius:16px;padding:16px;
  border:1px solid var(--cb);transition:all 0.2s;cursor:pointer;}
.pupil-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}
.pupil-card.alert{border-color:rgba(245,185,66,0.4);background:rgba(245,185,66,0.04);}
.pupil-card.stuck{border-color:rgba(255,79,106,0.35);background:rgba(255,79,106,0.04);}
.pupil-name{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--text);}
.pupil-status{font-size:11px;color:var(--muted);margin-bottom:10px;}
.pupil-progress{display:flex;gap:3px;margin-bottom:8px;}
.pp-dot{flex:1;height:4px;border-radius:2px;background:var(--cb);}
.pp-dot.done{background:var(--s);}
.pp-dot.now{background:var(--a);}
.pupil-tags{display:flex;flex-wrap:wrap;gap:4px;}
.ptag{padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700;
  border:1px solid;text-transform:uppercase;letter-spacing:0.5px;}
.ptag-stuck{background:rgba(255,79,106,0.08);border-color:rgba(255,79,106,0.25);color:var(--k);}
.ptag-ok{background:rgba(0,201,167,0.08);border-color:rgba(0,201,167,0.25);color:var(--s);}
.ptag-warn{background:rgba(245,185,66,0.08);border-color:rgba(245,185,66,0.25);color:var(--a);}
.ptag-done{background:rgba(79,158,255,0.08);border-color:rgba(79,158,255,0.25);color:var(--t);}
.dash-empty{text-align:center;padding:48px 20px;color:var(--muted);}
.dash-empty .de-icon{font-size:40px;margin-bottom:12px;}
.dash-empty p{font-size:13px;line-height:1.7;}
.dash-detail{background:var(--card);border-radius:16px;padding:20px;
  border:1px solid var(--cb);margin-top:16px;}
.dd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.dd-name{font-family:'Fraunces',serif;font-size:18px;font-weight:700;}
.dd-close{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;
  background:transparent;border:1px solid var(--cb);color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif;}
.dd-steps{display:flex;flex-direction:column;gap:8px;}
.dd-step{display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--cb);}
.dd-step-letter{font-family:'Fraunces',serif;font-size:18px;font-weight:900;width:20px;}
.dd-step-info{flex:1;}
.dd-step-name{font-size:12px;font-weight:600;color:var(--text);}
.dd-step-text{font-size:11px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px;}
.dd-step-bar{width:80px;height:4px;border-radius:2px;background:var(--cb);overflow:hidden;}
.dd-step-fill{height:100%;border-radius:2px;}
.dd-hint{margin-top:12px;padding:10px 14px;border-radius:10px;
  background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.15);
  font-size:12px;color:var(--muted);}
.dd-hint strong{color:var(--pu);}
.class-code-wrap{text-align:center;margin-top:24px;padding:20px;
  background:rgba(0,201,167,0.04);border:1px solid rgba(0,201,167,0.15);
  border-radius:14px;}
.class-code{font-family:'Fraunces',serif;font-size:28px;font-weight:900;
  color:var(--s);letter-spacing:4px;margin:8px 0;}
.class-code-desc{font-size:12px;color:var(--muted);}

/* ── INTRO ── */
.intro-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:8px;margin:20px 0;}
.feat{padding:14px;border-radius:14px;background:rgba(255,255,255,0.02);
  border:1px solid var(--cb);text-align:center;}
.feat-icon{font-size:22px;margin-bottom:6px;}
.feat-name{font-size:11.5px;font-weight:700;color:var(--text);margin-bottom:3px;}
.feat-desc{font-size:10.5px;color:var(--muted);line-height:1.5;}
.method-pills{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0;}
.mpill{flex:1;min-width:100px;padding:10px 12px;border-radius:12px;
  background:rgba(255,255,255,0.02);border:1px solid var(--cb);
  display:flex;align-items:center;gap:8px;}
.mpill-letter{font-family:'Fraunces',serif;font-size:20px;font-weight:900;}
.mpill-text strong{display:block;font-size:11px;font-weight:700;color:var(--text);}
.mpill-text span{font-size:10px;color:var(--muted);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.form-field{}
.form-label{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
input[type=text]{width:100%;padding:12px 14px;border-radius:12px;
  border:1.5px solid var(--cb);background:rgba(255,255,255,0.025);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:all 0.25s;}
input[type=text]:focus{border-color:var(--s);box-shadow:0 0 0 3px rgba(0,201,167,0.08);}
input::placeholder{color:var(--faint);}

/* ── TOOLTIP / TIPP-PANEL ── */
.tipp-panel{margin-top:10px;padding:14px 16px;border-radius:12px;
  background:rgba(167,139,250,0.04);border:1px solid rgba(167,139,250,0.15);
  font-size:12.5px;line-height:1.65;animation:cardIn 0.3s ease;}
.tipp-fix{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:7px;background:rgba(255,79,106,0.07);border:1px solid rgba(255,79,106,0.2);
  color:#f87171;font-size:11.5px;margin:2px;cursor:pointer;transition:all 0.2s;}
.tipp-fix:hover{background:rgba(0,201,167,0.08);border-color:var(--s);color:var(--s);}
.tipp-ok{color:var(--s);font-weight:700;font-size:13px;display:flex;
  align-items:center;gap:6px;}
.tipp-floskel{padding:8px 12px;border-radius:9px;background:rgba(245,185,66,0.05);
  border:1px solid rgba(245,185,66,0.15);margin-bottom:6px;font-size:12px;line-height:1.6;}
.tipp-floskel-msg{color:var(--a);font-weight:700;font-size:11px;margin-bottom:3px;}
.tipp-floskel-fix{color:var(--s);font-size:11px;}
.spell-toggle{display:inline-flex;align-items:center;gap:5px;margin-top:10px;
  padding:7px 14px;border-radius:9px;background:rgba(167,139,250,0.07);
  border:1.5px solid rgba(167,139,250,0.2);color:var(--pu);
  font-size:11.5px;font-weight:700;cursor:pointer;transition:all 0.2s;
  font-family:'DM Sans',sans-serif;}
.spell-toggle:hover{background:rgba(167,139,250,0.14);}

/* ── RESPONSIVE ── */
@media(max-width:560px){
  .card{padding:20px 16px;}
  .letter-wrap{padding:28px 18px;}
  .compare{grid-template-columns:1fr;}
  .btn-row{flex-direction:column;}
  .btn{width:100%;text-align:center;}
  .result-actions{flex-direction:column;}
  .act{width:100%;text-align:center;}
  .form-grid{grid-template-columns:1fr;}
  .pupil-grid{grid-template-columns:1fr;}
}

@media print{
  @page{size:A4;margin:18mm 22mm;}
  body,html{background:#fff!important;color:#000!important;}
  body::before{display:none!important;}
  .mode-bar,.app>*:not(.container),.btn-row,.result-actions,.ibox,.compare,
  .sparks-wrap,.qmeter,.coach,.spell-toggle,.tipp-panel,.interview,.gerust,
  .final-wrap,.coach-input-row,.coach-chat,
  .progress-wrap,.step-hdr,.intro-features,.method-pills,
  .colorbar,.freeze-hint{display:none!important;}
  .container{max-width:100%!important;padding:0!important;}
  .card{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;}
  .letter-wrap{background:#fff!important;box-shadow:none!important;border:none!important;padding:0!important;}
  .letter-wrap *{color:#000!important;}
  .letter-subject{font-size:13pt!important;}
  .letter-body p{font-size:11pt!important;line-height:1.75!important;}
  .seg-tag{display:none!important;}
}

/* ── AI COACH PANEL ── */
/* ── COACH CHAT ── */
.coach-chat{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.chat-msg{font-size:13px;line-height:1.6;padding:8px 12px;border-radius:12px;max-width:90%;animation:fadeUp 0.2s;}
.chat-msg.user{align-self:flex-end;background:rgba(167,139,250,0.15);color:var(--text);border-bottom-right-radius:4px;}
.chat-msg.ai{align-self:flex-start;background:rgba(255,255,255,0.05);color:rgba(232,237,245,0.8);border-bottom-left-radius:4px;}
.coach-input-row{display:flex;gap:8px;margin-top:8px;}
.coach-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--cb);border-radius:12px;
  padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;}
.coach-input:focus{border-color:var(--pu);}
.coach-input::placeholder{color:var(--faint);}
.coach-send{background:linear-gradient(135deg,var(--pu),#8b5cf6);border:none;border-radius:12px;
  padding:10px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.coach-send:hover{opacity:0.9;}
.coach-send:disabled{opacity:0.3;cursor:not-allowed;}
/* ── FINAL ANALYSIS ── */
.final-wrap{margin-top:20px;border-radius:16px;overflow:hidden;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);}
.final-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(167,139,250,0.1);}
.final-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);}
.final-body{padding:14px 16px;font-size:13px;line-height:1.7;color:rgba(232,237,245,0.8);}
.final-body p{margin-bottom:10px;}
.final-btn{background:linear-gradient(135deg,var(--pu),#8b5cf6);border:none;border-radius:14px;
  padding:12px 24px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;}
.final-btn:hover{opacity:0.9;}
.final-improved{margin-top:14px;background:rgba(255,255,255,0.04);border:1px solid var(--cb);border-radius:14px;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;}
.final-copy{margin-top:10px;background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.2);border-radius:10px;
  padding:8px 16px;color:var(--pu);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.ai-coach-wrap{margin-top:14px;border-radius:16px;overflow:hidden;
  border:1px solid rgba(167,139,250,0.25);background:rgba(10,18,35,0.6);}
.ai-coach-header{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(167,139,250,0.08);border-bottom:1px solid rgba(167,139,250,0.15);}
.ai-coach-av{width:28px;height:28px;border-radius:8px;background:rgba(167,139,250,0.2);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ai-coach-label{font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--pu);}
.ai-coach-status{font-size:10px;color:var(--muted);margin-left:auto;display:flex;
  align-items:center;gap:5px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--s);}
.ai-dot.thinking{background:var(--a);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ai-coach-body{padding:12px 14px;}
.ai-feedback{font-size:13px;line-height:1.7;color:rgba(232,237,245,0.8);min-height:20px;}
.ai-feedback .ai-good{color:var(--s);font-weight:600;}
.ai-feedback .ai-warn{color:var(--a);font-weight:600;}
.ai-feedback .ai-fix{color:var(--k);font-weight:600;}
.ai-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.ai-btn{padding:6px 12px;border-radius:8px;font-size:11.5px;font-weight:600;
  border:1.5px solid;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;
  background:transparent;}
.ai-btn-suggest{border-color:rgba(0,201,167,0.3);color:var(--s);}
.ai-btn-suggest:hover{background:var(--sl);}
.ai-btn-fix{border-color:rgba(245,185,66,0.3);color:var(--a);}
.ai-btn-fix:hover{background:rgba(245,185,66,0.08);}
.ai-btn-freeze{border-color:rgba(167,139,250,0.3);color:var(--pu);}
.ai-btn-freeze:hover{background:var(--pul);}
.ai-suggestion{margin-top:10px;padding:12px 14px;border-radius:10px;
  background:rgba(0,201,167,0.05);border:1px solid rgba(0,201,167,0.2);
  font-size:13px;line-height:1.7;color:var(--text);position:relative;}
.ai-sug-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--s);margin-bottom:6px;}
.ai-sug-text{font-style:italic;color:rgba(232,237,245,0.85);}
.ai-sug-actions{display:flex;gap:6px;margin-top:8px;}
.ai-sug-use{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;
  background:var(--s);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.ai-sug-discard{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;
  background:transparent;color:var(--muted);border:1px solid var(--cb);
  cursor:pointer;font-family:'DM Sans',sans-serif;}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--pu);
  vertical-align:middle;margin-left:1px;animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* API key setup */
.api-setup{padding:16px;border-radius:12px;background:rgba(0,201,167,0.04);
  border:1px solid rgba(0,201,167,0.15);margin-bottom:16px;}
.api-setup-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--s);margin-bottom:8px;}
.api-setup-row{display:flex;gap:8px;align-items:center;}
.api-input{flex:1;padding:9px 12px;border-radius:10px;
  border:1.5px solid var(--cb);background:rgba(255,255,255,0.03);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
  transition:all 0.2s;}
.api-input:focus{border-color:var(--s);}
.api-save{padding:9px 16px;border-radius:10px;background:var(--s);color:#fff;
  border:none;cursor:pointer;font-size:12px;font-weight:700;
  font-family:'DM Sans',sans-serif;white-space:nowrap;}
.api-save:hover{filter:brightness(1.1);}
.api-status{font-size:11px;margin-top:6px;}
.api-ok{color:var(--s);}
.api-err{color:var(--k);}

<body>

<div class="mode-bar">
  <div class="mode-logo">STARK</div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-schueler" onclick="switchMode('schueler')">✏️ Schüler:in</button>
    <button class="mode-tab" id="tab-lp" onclick="switchMode('lehrperson')">👁 Lehrperson</button>
  </div>
</div>

<div class="app">
  <div id="schueler-view">
    <div class="hero">
      <div class="hero-badge">✦ Bewerbungs-Coach</div>
      <div class="stark-word">
        <span class="l0">S</span><span class="l1">T</span><span class="l2">A</span><span class="l3">R</span><span class="l4">K</span>
      </div>
      <div class="hero-sub">Dein Brief, deine Geschichte.</div>
      <div class="hero-desc">5 Schritte zu einem Motivationsschreiben das zeigt, wer du wirklich bist.</div>
    </div>
    <div class="container" id="app"></div>
  </div>
  <div id="lehrperson-view" style="display:none;">
    <div class="container" id="dash-app"></div>
  </div>
</div>

<div id="freeze-hint" class="freeze-hint" style="display:none;">
  <span>💬</span>
  <span id="freeze-msg">Brauchst du einen Tipp? Schau dir die Impulse unten an.</span>
  <span class="freeze-close" onclick="dismissFreeze()">✕</span>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const STEPS = [
  {
    key:"S", full:"Story", de:"Deine Geschichte",
    hex:"#00c9a7", light:"rgba(0,201,167,0.12)",
    desc:"Beginne mit einem echten Moment aus deinem Leben.",
    why:"Lehrmeister lesen viele Bewerbungen. Die meisten beginnen mit «Hiermit bewerbe ich mich…». Dein Brief beginnt mit einer Geschichte — das bleibt hängen.",
    bad:"Hiermit bewerbe ich mich für die ausgeschriebene Lehrstelle als Informatiker.",
    good:"Mit 12 habe ich zum ersten Mal den Laptop meiner Mutter repariert. Seitdem lässt mich Technik nicht mehr los.",
    // Geführtes Interview
    interview: [
      {
        id:"erfahrung",
        text:"Hast du schon mal geschnuppert oder etwas mit diesem Beruf erlebt?",
        options:["Ja, ich war schnuppern","Jemand in meiner Familie macht diesen Beruf","Ich habe es selbst ausprobiert","Ich habe davon gehört / gelesen"]
      },
      {
        id:"moment",
        text:"Was war ein Moment, den du nicht vergessen hast?",
        type:"text",
        placeholder:"Z.B. Als ich gesehen habe wie... / Als mir jemand gezeigt hat..."
      }
    ],
    gerustFn:(iv)=>{
      const erfahrung = iv.erfahrung||"...";
      const moment = iv.moment||"...";
      let starter = erfahrung.includes("schnuppern") ? "Während meiner Schnupperwoche" :
                    erfahrung.includes("Familie") ? "In meiner Familie" :
                    erfahrung.includes("ausprobiert") ? "Als ich es selbst ausprobiert habe" : "Als ich davon erfahren habe";
      return `<span class="blank">${starter}</span> habe ich erlebt: <span class="blank">${moment||"..."}</span>. Genau da wusste ich: <span class="blank">Das will ich lernen.</span>`;
    },
    sparks:["Als ich zum ersten Mal...","Ein Moment, der alles veränderte:","Schon als ich klein war...","Nach meiner Schnupperlehre war mir klar:","Der Tag, an dem ich wusste:"],
    placeholder:"Erzähle einen kurzen, echten Moment — was hast du erlebt, gesehen, gespürt?",
    coachQ:(text)=>{
      if(!text||text.length<20) return "Was genau hast du in diesem Moment <strong>gespürt</strong>? Versuch, das in einem Satz zu beschreiben.";
      if(text.match(/hiermit|bewerbe ich mich/i)) return "Dieser Anfang klingt nach einem Formular. Welcher <strong>echte Moment</strong> hat dich zu diesem Beruf gebracht?";
      if(!text.match(/ich|mich|mir|mein/i)) return "Gut angefangen! Jetzt noch: <strong>Wo warst du?</strong> Was hast du gesehen oder gefühlt?";
      return "Stark! Gibt es eine <strong>konkrete Person oder Situation</strong> die du noch erwähnen könntest?";
    },
    coachHint:"Stell dir vor, jemand dreht einen Film über deinen Weg. Welche Szene zeigt am besten, wie du zu diesem Beruf kamst?",
    check:(v)=>{
      if(!v) return {score:0,chips:[]};
      const w=v.split(/\s+/).length;
      let chips=[
        {label:"Konkret",hit:!!(v.match(/als ich|da|dort|beim|während|einmal|mal/i)&&w>8)},
        {label:"Persönlich",hit:!!(v.match(/ich|mich|mir|mein/i))},
        {label:"Kein Formular",hit:!v.match(/hiermit|bewerbe ich mich|auf ihre ausschreibung/i)},
        {label:"Ausreichend",hit:w>=12},
      ];
      const score=Math.round(chips.filter(c=>c.hit).length/chips.length*100);
      return {score,chips};
    }
  },
  {
    key:"T", full:"Talente", de:"Was du drauf hast",
    hex:"#4f9eff", light:"rgba(79,158,255,0.12)",
    desc:"Zeige deine Stärken — mit Beweisen, nicht mit Adjektiven.",
    why:"«Ich bin motiviert und teamfähig» sagt jeder. Was zählt: Was hast du GEMACHT, nicht was du BIST. Jede Stärke braucht einen Beweis.",
    bad:"Ich bin zuverlässig, motiviert und teamfähig. Ausserdem arbeite ich sehr genau.",
    good:"Im Klassenprojekt habe ich die Planung übernommen und dafür gesorgt, dass wir als einzige Gruppe pünktlich fertig wurden.",
    interview:[
      {
        id:"staerke",
        text:"Welche Stärke passt am besten zu dir?",
        options:["Ich helfe gerne anderen","Ich arbeite genau und sorgfältig","Ich lerne schnell Neues","Ich übernehme Verantwortung","Ich bin ruhig in schwierigen Situationen"]
      },
      {
        id:"beweis",
        text:"Wann hast du das bewiesen? Nenn eine konkrete Situation:",
        type:"text",
        placeholder:"Z.B. Im Schulprojekt / Beim Sport / Zuhause / In der Schnupperlehre..."
      }
    ],
    gerustFn:(iv)=>{
      const staerke = iv.staerke||"...";
      const beweis = iv.beweis||"...";
      const staerkeKurz = staerke.includes("helfe") ? "gerne mit anpacke" :
                         staerke.includes("genau") ? "sorgfältig arbeite" :
                         staerke.includes("lerne") ? "schnell lerne" :
                         staerke.includes("Verantwortung") ? "Verantwortung übernehme" : "ruhig bleibe";
      return `Ich zeige gerne, dass ich <span class="blank">${staerkeKurz}</span>. Zum Beispiel: <span class="blank">${beweis||"..."}</span>.`;
    },
    sparks:["Im Schulprojekt habe ich...","Beim Sport habe ich gelernt:","Zuhause helfe ich oft...","In der Schnupperlehre konnte ich...","Meine Lehrperson sagt über mich:"],
    placeholder:"Nenne 1–2 Stärken mit konkreten Beispielen. Was hast du GEMACHT?",
    coachQ:(text)=>{
      if(!text||text.length<20) return "Beschreibe eine Situation wo du diese Stärke <strong>bewiesen</strong> hast — auch Kleinigkeiten zählen!";
      if(text.match(/^ich bin \w+ und \w+/i)&&!text.match(/habe|gemacht|gelernt/i)) return "Du nennst Adjektive — aber welches <strong>konkrete Erlebnis</strong> zeigt das?";
      if(text.match(/habe ich|konnte ich|beim|im projekt/i)) return "Super mit dem Beispiel! Noch eine Frage: <strong>Was war das Ergebnis?</strong> Was ist dadurch besser geworden?";
      return "Gut! Schreib noch dazu, <strong>wo und wann</strong> das war.";
    },
    coachHint:"Formel: «Ich bin [Stärke] — das zeige ich an [konkretem Beispiel].» Kein Beispiel = keine Aussage.",
    check:(v)=>{
      if(!v) return {score:0,chips:[]};
      const w=v.split(/\s+/).length;
      let chips=[
        {label:"Beispiel",hit:!!(v.match(/habe|konnte|beim|im|als ich|einmal|projekt|sport|schule/i))},
        {label:"Nicht nur Adjektive",hit:!!(v.match(/habe|machte|war|ging|übernahm|konnte/i))},
        {label:"Konkrete Situation",hit:!!(v.match(/beim|im|als|während|in der/i))},
        {label:"Ausreichend",hit:w>=12},
      ];
      const score=Math.round(chips.filter(c=>c.hit).length/chips.length*100);
      return {score,chips};
    }
  },
  {
    key:"A", full:"Antrieb", de:"Warum dieser Beruf",
    hex:"#f5b942", light:"rgba(245,185,66,0.12)",
    desc:"Was treibt dich an? Warum genau dieser Beruf?",
    why:"Echte Begeisterung spürt man. Zeige, dass du weisst was dich erwartet — und dass du es WILLST. Nicht weil es «gut tönt», sondern weil es zu DIR passt.",
    bad:"Der Beruf interessiert mich sehr und ich denke, dass er gute Zukunftsperspektiven hat.",
    good:"Wenn ich einem Menschen helfe und ich sehe das Lächeln — vergesse ich die Zeit. Das will ich jeden Tag spüren.",
    interview:[
      {
        id:"faszination",
        text:"Was fasziniert dich an diesem Beruf am meisten?",
        options:["Mit Menschen arbeiten","Etwas mit den Händen erschaffen","Probleme lösen","Anderen helfen","Etwas Neues lernen jeden Tag"]
      },
      {
        id:"vergessen",
        text:"Wann vergisst du die Zeit? Bei welcher Tätigkeit?",
        type:"text",
        placeholder:"Z.B. Wenn ich jemandem erkläre wie etwas funktioniert..."
      }
    ],
    gerustFn:(iv)=>{
      const fasc = iv.faszination||"...";
      const verg = iv.vergessen||"...";
      const fascKurz = fasc.includes("Menschen") ? "mit Menschen zu arbeiten" :
                       fasc.includes("Händen") ? "mit den Händen zu schaffen" :
                       fasc.includes("Probleme") ? "Probleme zu lösen" :
                       fasc.includes("helfen") ? "anderen zu helfen" : "immer Neues zu lernen";
      return `Was mich an diesem Beruf fasziniert ist <span class="blank">${fascKurz}</span>. Wenn ich <span class="blank">${verg||"..."}</span>, vergesse ich die Zeit. Das will ich zum Beruf machen.`;
    },
    sparks:["Was mich fasziniert:","Ich will jeden Tag...","Dieser Beruf passt zu mir, weil...","Das Gefühl wenn ich...","Nach der Schnupperlehre wusste ich:"],
    placeholder:"Was begeistert dich? Was willst du lernen? Warum passt dieser Beruf zu DIR?",
    coachQ:(text)=>{

const SPELL_RULES=[
  [/das\s+selbe/gi,"dasselbe"],[/zu\s+hause/gi,"zuhause"],
  [/so\s+dass/gi,"sodass"],[/auf\s+grund/gi,"aufgrund"],
  [/(D|d)aß/g,"$1ass"],[/muß/gi,"muss"],
  [/ihren betrieb/g,"Ihren Betrieb"],[/ihre firma/gi,"Ihre Firma"],
  [/([.!?])([A-ZÄÖÜ])/g,"$1 $2"],[/\s{2,}/g," "],
];
const FLOSKEL_PATTERNS=[
  {pat:/hiermit bewerbe ich mich/i,msg:"«Hiermit bewerbe ich mich» ist die langweiligste Eröffnung.",fix:"Starte direkt mit deiner Geschichte"},
  {pat:/ich bin motiviert/i,msg:"«Ich bin motiviert» sagt jeder — zeig es mit einem Beispiel.",fix:"Beschreibe eine konkrete Situation"},
  {pat:/ich bin teamfähig/i,msg:"«Teamfähig» ist ein leeres Wort.",fix:"z.B. «Im Projekt habe ich koordiniert»"},
  {pat:/würde mich freuen/i,msg:"Konjunktiv macht dich klein!",fix:"«Ich freue mich auf ein Gespräch»"},
  {pat:/guten Ruf/i,msg:"«Guter Ruf» ist zu allgemein.",fix:"Nenne ein konkretes Detail"},
  {pat:/hochmotiviert/i,msg:"«Hochmotiviert» klingt wie ein Inserat.",fix:"Zeig es mit einem echten Erlebnis"},
];

function checkText(text){
  if(!text||text.length<10) return {fixes:[],floskeln:[],clean:text};
  let fixes=[],clean=text;
  SPELL_RULES.forEach(([pat,repl])=>{
    const matches=text.match(pat);
    if(matches){matches.forEach(m=>{if(m.trim()!==repl.trim()) fixes.push({wrong:m.trim(),right:repl,type:"spell"});});clean=clean.replace(pat,repl);}
  });
  let floskeln=[];
  FLOSKEL_PATTERNS.forEach(f=>{if(f.pat.test(text)) floskeln.push(f);});
  return{fixes,floskeln,clean};
}

function attachEvents(){
  // Input listeners for intro
  ["name","ort","beruf","betrieb"].forEach(k=>{
    const el=document.getElementById(`inp-${k}`);
    if(el) el.addEventListener("input",e=>{
      state.data[k]=e.target.value;
      // Update button
      const btn=document.getElementById("btn-start");
      const can=state.data.name&&state.data.beruf&&state.data.betrieb&&state.data.ort;
      if(btn){btn.disabled=!can;btn.style.opacity=can?"1":"0.25";}
    });
  });
}

function setIV(stepKey, field, val){
  if(!state.interviews[stepKey]) state.interviews[stepKey]={};
  state.interviews[stepKey][field]=val;
  const s = STEPS.find(st=>st.key===stepKey);
  if(!s) return;

  // Update option button styles in-place (no re-render)
  const q = s.interview ? s.interview.find(q=>q.id===field) : null;
  if(q && q.options){
    document.querySelectorAll('.iq-opt').forEach(btn=>{
      const txt = btn.textContent.trim();
      if(q.options.includes(txt)){
        const selected = txt===val;
        btn.classList.toggle('selected', selected);
        btn.style.borderColor = selected ? s.hex : '';
        btn.style.background  = selected ? s.light : '';
        btn.style.color       = selected ? s.hex : '';
      }
    });
  }

  // Update Satzgerüst in-place
  const iv = state.interviews[stepKey]||{};
  const gerustText = document.querySelector('.gerust-text');
  if(gerustText){
    gerustText.innerHTML = s.gerustFn(iv);
  } else if(Object.keys(iv).length > 0){
    // First time: inject the Gerüst block after .interview
    const ivEl = document.querySelector('.interview');
    if(ivEl && !document.querySelector('.gerust')){
      const div = document.createElement('div');
      div.className = 'gerust';
      div.style.cssText = 'background:rgba(255,255,255,0.02);border-radius:14px;padding:16px 18px;border:1px solid var(--cb);margin-bottom:16px;';
      div.innerHTML = '<div class="gerust-title" style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:10px;">⟡ Dein Satzgerüst</div>'
                    + '<div class="gerust-text" style="font-size:13.5px;line-height:1.9;color:var(--text);">' + s.gerustFn(iv) + '</div>';
      ivEl.insertAdjacentElement('afterend', div);
    }
  }
}

function onTextChange(val){
  const s=STEPS[state.step];
  state.answers[s.key]=val;
  resetFreeze();
  // Delayed re-render for quality meter
  clearTimeout(window._renderTimer);
  window._renderTimer = setTimeout(()=>{
    // Update chips without full re-render
    const s2=STEPS[state.step];
    const {score,chips}=s2.check(val);
    const barColor = score>=80?"var(--s)":score>=50?"var(--a)":"var(--k)";
    const qm=document.querySelector(".qmeter");
    if(qm && val.length>5){
      const fill=qm.querySelector(".qm-fill");
      const pct=qm.querySelector(".qm-pct");
      if(fill){fill.style.width=score+"%";fill.style.background=barColor;}
      if(pct){pct.textContent=score+"%";pct.style.color=barColor;}
    }
    // Update button
    const btn=document.getElementById("btn-next");
    if(btn){
      btn.disabled=!val.trim();
      btn.style.background=val.trim()?`linear-gradient(135deg,${s2.hex},${s2.hex}cc)`:"";
      btn.style.opacity=val.trim()?"1":"0.2";
    }
    // Save to dashboard
    saveToDash();
    // Trigger AI feedback after pause
    triggerAIFeedback();
    // Inject qmeter if it doesn't exist yet
    if(val.length>5 && !document.querySelector('.qmeter')){
      const ta=document.getElementById('main-ta');
      if(ta && ta.parentNode){
        const s3=STEPS[state.step];
        const {score:sc,chips:ch}=s3.check(val);
        const bc=sc>=80?'var(--s)':sc>=50?'var(--a)':'var(--k)';
        const qDiv=document.createElement('div');
        qDiv.className='qmeter';
        qDiv.innerHTML=`<div class="qm-bar-wrap"><div class="qm-track"><div class="qm-fill" style="width:${sc}%;background:${bc};"></div></div><div class="qm-pct" style="color:${bc}">${sc}%</div></div><div class="qm-chips">${ch.map(c=>`<div class="qm-chip ${c.hit?'hit':'miss'}" style="border-color:${c.hit?s3.hex:'rgba(255,255,255,0.12)'};color:${c.hit?s3.hex:'var(--muted)'}">${c.hit?'✓':'○'} ${c.label}</div>`).join('')}</div>`;
        ta.insertAdjacentElement('afterend', qDiv);
      }
    } else if(val.length>5){
      // Update existing chips
      const s3=STEPS[state.step];
      const {score:sc,chips:ch}=s3.check(val);
      const bc=sc>=80?'var(--s)':sc>=50?'var(--a)':'var(--k)';
      const chipEls=document.querySelectorAll('.qm-chip');
      ch.forEach((c,i)=>{
        if(chipEls[i]){
          chipEls[i].className=`qm-chip ${c.hit?'hit':'miss'}`;
          chipEls[i].style.borderColor=c.hit?s3.hex:'rgba(255,255,255,0.12)';
          chipEls[i].style.color=c.hit?s3.hex:'var(--muted)';
          chipEls[i].textContent=`${c.hit?'✓':'○'} ${c.label}`;
        }
      });
    }
  }, 300);
}

function appendSpark(sp){
  const s=STEPS[state.step];
  const cur=state.answers[s.key]||"";
  const newVal=cur?(cur+(cur.endsWith(" ")?"":"\n")+sp):sp;
  state.answers[s.key]=newVal;
  // Update textarea directly — no full re-render
  const ta=document.getElementById("main-ta");
  if(ta){
    ta.value=newVal;
    ta.focus();
    // Mark spark as used
    document.querySelectorAll('.spark').forEach(el=>{
      if(el.textContent.trim()===sp.trim()) el.classList.add('used');
    });
    onTextChange(newVal);
  }
}

function applyHint(){
  const s=STEPS[state.step];
  // Flash coach tip
  const coach=document.querySelector(".coach-q");
  if(coach){
    coach.innerHTML=`<strong>Tipp:</strong> ${s.coachHint}`;
    coach.style.color="rgba(232,237,245,0.9)";
  }
}

function applyFix(idx){
  const s=STEPS[state.step];
  const text=state.answers[s.key]||"";
  const {fixes}=checkText(text);
  if(fixes[idx]&&fixes[idx].type==="spell"){
    const newVal=text.replace(fixes[idx].wrong,fixes[idx].right);
    state.answers[s.key]=newVal;
    const ta=document.getElementById("main-ta");
    if(ta) ta.value=newVal;
    // Re-render only the spell panel
    toggleSpell(); toggleSpell();
  }
}

function toggleSpell(){
  state.showSpell = state.showSpell===state.step ? null : state.step;
  // Only update the spell section, preserve scroll
  const scrollY = window.scrollY;
  render();
  window.scrollTo(0, scrollY);
}

function startSteps(){
  state.screen="step";
  state.step=0;
  resetFreeze();
  render();
}

function goNext(){
  if(state.step<4){ state.step++; state.showSpell=null; render(); window.scrollTo(0,0); }
  else { state.screen="result"; render(); window.scrollTo(0,0); }
}
function goBack(){
  if(state.step>0){state.step--;state.showSpell=null;render();window.scrollTo(0,0);}
  else{state.screen="intro";render();}
}
function goBackToStep(){state.screen="step";state.step=4;render();window.scrollTo(0,0);}

function copyText(){
  const {name,beruf,betrieb,ort}=state.data;

  const today=new Date().toLocaleDateString("de-CH",{day:"numeric",month:"long",year:"numeric"});

// ── Core API call with streaming ──
async function callAI(systemPrompt, userMsg, onChunk, onDone, maxTok){
  if(!apiKey){ onDone('(Kein API-Key — im Lehrperson-Modus eingeben)'); return; }
  aiState.thinking = true;
  updateAIStatus(true);
  let full = '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens: maxTok || 400,
        system: systemPrompt,
        messages:[{role:'user',content:userMsg}]
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error?.message || 'API-Fehler '+res.status);
    }
    const data = await res.json();
    full = data.content?.map(b=>b.text||'').join('') || '';
    onChunk(full);
  } catch(e){
    full = '⚠ ' + (e.message||'Verbindungsfehler');
    onChunk(full);
  }
  aiState.thinking = false;
  updateAIStatus(false);
  onDone(full);
}

function updateAIStatus(thinking){
  document.querySelectorAll('.ai-dot').forEach(d=>{
    d.classList.toggle('thinking', thinking);
  });
  document.querySelectorAll('.ai-coach-status span:last-child').forEach(el=>{
    if(el.classList.contains('ai-dot')) return;
    el.textContent = thinking ? 'denkt…' : 'bereit';
  });
}

// ── Build system prompt for current step ──
function buildSystemPrompt(stepKey, beruf, betrieb){
  const stepNames = {S:'Story (persönliche Geschichte)',T:'Talente (Stärken mit Beweisen)',A:'Antrieb (Motivation)',R:'Resonanz (Warum dieser Betrieb)',K:'Klartext (Starker Schluss)'};
  return `Du bist ein einfühlsamer Bewerbungs-Coach für Jugendliche (13-16 Jahre) in einer Kleinklasse. Viele haben ADHS oder ASS.
Aktueller Schritt: ${stepNames[stepKey] || stepKey}
Lehrberuf: ${beruf || 'unbekannt'}
Betrieb: ${betrieb || 'unbekannt'}

Deine Regeln:
- Antworte IMMER auf Deutsch, kurz und einfach (max. 3 Sätze)
- Sei warm, ermutigend, nie kritisch oder überwältigend
- Stelle NUR EINE Frage am Ende, nie mehrere
- Nutze einfache Sprache (Niveau 8. Klasse)
- Wenn du Feedback gibst: erst das Positive, dann ONE Verbesserung
- Kein Konjunktiv in deinen Vorschlägen
- Floskeln wie "hiermit bewerbe" oder "motiviert und teamfähig" aktiv ansprechen
- Format: Nur Fliesstext, keine Listen, keine Emojis ausser am Anfang`;
}

// ── FEEDBACK after typing pause ──
function triggerAIFeedback(){
  const s = STEPS[state.step];
  const text = state.answers[s.key] || '';
  if(!text || text.length < 20) return;
  clearTimeout(aiState.feedbackTimer);
  aiState.feedbackTimer = setTimeout(()=> doAIFeedback(s, text), 1800);
}

function doAIFeedback(s, text){
  const feedbackEl = document.getElementById('ai-feedback-text');
  if(!feedbackEl) return;
  const sys = buildSystemPrompt(s.key, state.data.beruf, state.data.betrieb);
  const msg = `Der Schüler/die Schülerin hat für den Abschnitt "${s.full} — ${s.de}" folgendes geschrieben:\n\n"${text}"\n\nGib kurzes, ermutigendes Feedback: Was ist gut? Was fehlt noch? Stelle am Ende EINE konkrete Frage.`;
  feedbackEl.innerHTML = '<span class="ai-cursor"></span>';
  callAI(sys, msg,
    (partial) => { feedbackEl.innerHTML = partial + '<span class="ai-cursor"></span>'; },
    (final)   => { feedbackEl.innerHTML = final; aiState.lastFeedback = final; }
  );
}

// ── SUGGESTION on demand ──
function requestAISuggestion(){
  const s = STEPS[state.step];
  const text = state.answers[s.key] || '';
  const iv = state.interviews[s.key] || {};
  const sugEl = document.getElementById('ai-suggestion-wrap');
  const sugText = document.getElementById('ai-suggestion-text');
  if(!sugEl || !sugText) return;
  sugEl.style.display = 'block';
  sugText.innerHTML = '<span class="ai-cursor"></span>';
  const sys = buildSystemPrompt(s.key, state.data.beruf, state.data.betrieb);
  const context = Object.entries(iv).map(([k,v])=>`${k}: ${v}`).join(', ');
  const msg = `Schreibe einen konkreten Beispiel-Satz (2-3 Sätze) für den Abschnitt "${s.full}".
Kontext aus den Antworten des Schülers: ${context || 'keine'}
Bisheriger Text: "${text || 'noch nichts'}"
Schreib einen Vorschlag der als Inspiration dient — authentisch, persönlich, keine Floskeln. Nur den Vorschlag, keine Einleitung.`;
  callAI(sys, msg,
    (partial) => { sugText.innerHTML = partial + '<span class="ai-cursor"></span>'; },
    (final)   => { sugText.innerHTML = final; aiState.lastSuggestion = final; }
  );
}

function useSuggestion(){
  const text = aiState.lastSuggestion;
  if(!text) return;
  const s = STEPS[state.step];
  const cur = state.answers[s.key] || '';
  const newVal = cur ? cur + '\n' + text : text;
  state.answers[s.key] = newVal;
  const ta = document.getElementById('main-ta');
  if(ta){ ta.value = newVal; onTextChange(newVal); }
  const wrap = document.getElementById('ai-suggestion-wrap');
  if(wrap) wrap.style.display = 'none';
}
function discardSuggestion(){
  const wrap = document.getElementById('ai-suggestion-wrap');
  if(wrap) wrap.style.display = 'none';
}

// ── SPELL+GRAMMAR via AI ──
function requestAISpell(){
  const s = STEPS[state.step];
  const text = state.answers[s.key] || '';
  if(!text || text.length < 10) return;
  const feedbackEl = document.getElementById('ai-feedback-text');
  if(!feedbackEl) return;
  const sys = buildSystemPrompt(s.key, state.data.beruf, state.data.betrieb);
  const msg = `Prüfe diesen Text auf Rechtschreibung, Grammatik und Floskeln:\n\n"${text}"\n\nGib eine kurze Liste der Fehler mit Korrektur. Wenn alles gut ist, sage das kurz. Format: Fehler → Korrektur (eine pro Zeile, max 4).`;
  feedbackEl.innerHTML = '<span class="ai-cursor"></span>';
  callAI(sys, msg,
    (partial) => { feedbackEl.innerHTML = partial + '<span class="ai-cursor"></span>'; },
    (final)   => { feedbackEl.innerHTML = final; }
  );
}

// ── FREEZE question via AI ──
function requestAIFreezeHelp(){
  if(aiState.freezeAsked) return;
  aiState.freezeAsked = true;
  const s = STEPS[state.step];
  const text = state.answers[s.key] || '';
  const iv = state.interviews[s.key] || {};
  const feedbackEl = document.getElementById('ai-feedback-text');
  if(!feedbackEl) return;
  dismissFreeze();
  // Scroll to coach
  const coachEl = document.querySelector('.ai-coach-wrap');
  if(coachEl) coachEl.scrollIntoView({behavior:'smooth', block:'center'});
  const sys = buildSystemPrompt(s.key, state.data.beruf, state.data.betrieb);
  const context = Object.entries(iv).map(([k,v])=>`${k}: ${v}`).join(', ');
  const msg = `Der Schüler/die Schülerin steckt fest bei "${s.full}". 
Bisheriger Text: "${text || 'nichts geschrieben'}"
Kontext: ${context || 'keine Antworten'}
Stelle eine einzige, sehr einfache und konkrete Frage die ihm/ihr hilft anzufangen. Keine Erklärung, nur die Frage.`;
  feedbackEl.innerHTML = '🤔 <span class="ai-cursor"></span>';
  callAI(sys, msg,
    (partial) => { feedbackEl.innerHTML = '🤔 ' + partial + '<span class="ai-cursor"></span>'; },
    (final)   => { feedbackEl.innerHTML = '🤔 ' + final; aiState.freezeAsked = false; }
  );
}

// ── Hook into freeze detection ──
const _origCheckFreeze = checkFreeze;

// ── COACH CHAT (direct questions) ──
const chatHistory = [];

function sendCoachMsg(){
  const input = document.getElementById('coach-input');
  if(!input) return;
  const msg = input.value.trim();
  if(!msg || aiState.thinking) return;
  input.value = '';

  const chatEl = document.getElementById('coach-chat');
  if(!chatEl) return;

  // Add user message
  chatHistory.push({role:'user', text:msg});
  chatEl.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;
  
  // Add AI placeholder
  const aiId = 'chat-ai-' + Date.now();
  chatEl.innerHTML += `<div class="chat-msg ai" id="${aiId}"><span class="ai-cursor"></span></div>`;
  chatEl.scrollTop = chatEl.scrollHeight;

  const s = STEPS[state.step];
  const text = state.answers[s.key] || '';
  const sys = buildSystemPrompt(s.key, state.data.beruf, state.data.betrieb) + 
    `\n\nDer Schüler stellt dir eine direkte Frage. Antworte hilfreich, kurz und ermutigend.
Aktueller Text des Schülers für diesen Abschnitt: "${text || '(noch nichts geschrieben)'}"`;

  callAI(sys, msg,
    (partial) => { const el=document.getElementById(aiId); if(el) el.innerHTML = partial + '<span class="ai-cursor"></span>'; chatEl.scrollTop = chatEl.scrollHeight; },
    (final)   => { const el=document.getElementById(aiId); if(el) el.innerHTML = final; chatHistory.push({role:'ai', text:final}); chatEl.scrollTop = chatEl.scrollHeight; }
  );
}

function escHtml(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// ── FINAL ANALYSIS ──
function runFinalAnalysis(){
  const btn = document.getElementById('final-btn');
  const body = document.getElementById('final-body');
  if(!body || !apiKey) { body.innerHTML='<span style="color:var(--muted);">⚙ Kein API-Key — im Lehrperson-Modus eingeben.</span>'; return; }
  if(btn) btn.disabled = true;
  
  const {name,beruf,betrieb,ort} = state.data;
  const {S,T,A,R,K} = state.answers;
  const fullLetter = `Story: ${S}\n\nTalente: ${T}\n\nAntrieb: ${A}\n\nResonanz: ${R}\n\nKlartext: ${K}`;

  body.innerHTML = '<div style="text-align:center;padding:16px;"><span class="ai-cursor"></span> Analysiere den ganzen Brief…</div>';

  const sys = `Du bist ein erfahrener Bewerbungs-Coach für Jugendliche (13-16, Kleinklasse, ADHS/ASS möglich).
Lehrberuf: ${beruf}, Betrieb: ${betrieb}, Ort: ${ort}, Name: ${name}

Du analysierst jetzt den KOMPLETTEN Motivationsbrief nach dem STARK-Modell.

Deine Aufgabe:
1. ANALYSE (kurz, max 2 Sätze pro Punkt):
   - Was ist stark am Brief? (Positives zuerst!)
   - Wo sind Floskeln oder leere Adjektive?
   - Fehlen konkrete Beispiele?
   - Gibt es Konjunktive (würde/könnte/möchte)?
   - Rechtschreibung/Grammatik

2. VERBESSERTE VERSION:
   Schreibe den kompletten Brief neu — verbessert aber im Stil des Schülers.
   Markiere den verbesserten Brief klar mit "---BRIEF---" am Anfang und "---ENDE---" am Ende.
   Der Brief soll:
   - Alle Floskeln durch authentische Formulierungen ersetzen
   - Konjunktive durch direkte Aussagen ersetzen
   - Konkrete Beispiele einbauen/stärken
   - Den persönlichen Ton des Schülers beibehalten
   - Korrekte Rechtschreibung und Grammatik haben

Antworte auf Deutsch, ermutigend, klar strukturiert.`;

  const msg = `Hier ist der komplette Motivationsbrief:\n\n${fullLetter}\n\nAnalysiere ihn und schreibe eine verbesserte Version.`;

  callAI(sys, msg,
    (partial) => { 
      body.innerHTML = formatFinalResponse(partial, true); 
    },
    (final) => { 
      body.innerHTML = formatFinalResponse(final, false);
      if(btn) btn.disabled = false;
    },
    1200
  );
}

function formatFinalResponse(text, streaming){
  // Split analysis from improved letter
  const briefStart = text.indexOf('---BRIEF---');
  const briefEnd = text.indexOf('---ENDE---');
  
  let analysis = text;
  let improved = '';
  
  if(briefStart > -1){
    analysis = text.substring(0, briefStart).trim();
    improved = text.substring(briefStart + 11, briefEnd > -1 ? briefEnd : undefined).trim();
  }
  
  let html = `<div style="margin-bottom:14px;">${analysis.replace(/\n/g,'<br>')}</div>`;
  
  if(improved){
    html += `<div class="final-improved">${improved.replace(/\n/g,'<br>')}</div>`;
    if(!streaming){
      html += `<button class="final-copy" onclick="copyImproved()">📋 Verbesserte Version kopieren</button>`;
    }
  }
  
  if(streaming) html += '<span class="ai-cursor"></span>';
  return html;
}

let lastImprovedText = '';
function copyImproved(){
  const el = document.querySelector('.final-improved');
  if(!el) return;
  lastImprovedText = el.innerText;
  navigator.clipboard.writeText(lastImprovedText).then(()=>{
    const btn = document.querySelector('.final-copy');
    if(btn){ btn.textContent = '✓ Kopiert!'; setTimeout(()=>{ btn.textContent = '📋 Verbesserte Version kopieren'; }, 2000); }
  });
}

// ── FINAL CHAT (questions about the letter) ──
function sendFinalChat(){
  const input = document.getElementById('final-chat-input');
  if(!input) return;
  const msg = input.value.trim();
  if(!msg || aiState.thinking) return;
  input.value = '';

  const chatEl = document.getElementById('final-chat');
  if(!chatEl) return;

  chatEl.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;
  
  const aiId = 'fchat-ai-' + Date.now();
  chatEl.innerHTML += `<div class="chat-msg ai" id="${aiId}"><span class="ai-cursor"></span></div>`;
  chatEl.scrollTop = chatEl.scrollHeight;

  const {name,beruf,betrieb} = state.data;
  const {S,T,A,R,K} = state.answers;
  const fullLetter = `S: ${S}\nT: ${T}\nA: ${A}\nR: ${R}\nK: ${K}`;

  const sys = `Du bist ein einfühlsamer Bewerbungs-Coach für Jugendliche (13-16, Kleinklasse).
Der Schüler ${name} hat einen Motivationsbrief als ${beruf} bei ${betrieb} geschrieben.
Hier ist der Brief:\n${fullLetter}\n
Der Schüler stellt dir jetzt Fragen zum fertigen Brief. Antworte kurz, ermutigend, hilfreich. Max 3 Sätze.`;

  callAI(sys, msg,
    (partial) => { const el=document.getElementById(aiId); if(el) el.innerHTML = partial + '<span class="ai-cursor"></span>'; chatEl.scrollTop = chatEl.scrollHeight; },
    (final)   => { const el=document.getElementById(aiId); if(el) el.innerHTML = final; chatEl.scrollTop = chatEl.scrollHeight; }
  );
}
checkFreeze = function(){
  if(Date.now()-lastTyped > 44000 && !freezeShown && state.screen==="step"){
    freezeShown=true;
    const freeze = document.getElementById("freeze-hint");
    if(freeze){
      freeze.style.display="flex";
      document.getElementById("freeze-msg").textContent = "Feststecken? Die KI stellt dir eine Frage!";
    }
    // Auto-trigger AI question
    setTimeout(requestAIFreezeHelp, 500);
  }
};
